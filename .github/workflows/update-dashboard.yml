name: Update live profile dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: write

concurrency:
  group: profile-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate source-only dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_dashboard.py --username ovws --output assets --check-readme README.md

      - name: Verify generated assets
        run: |
          python -m unittest discover -s tests -v
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          for path in Path("assets").glob("*.svg"):
              ET.parse(path)
              print(f"valid: {path}")
          PY

      - name: Commit refreshed signals
        run: |
          if git diff --quiet -- assets/dashboard-dark.svg assets/dashboard-light.svg; then
            echo "Dashboard is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dashboard-dark.svg assets/dashboard-light.svg
          git commit -m "refresh live profile signals"
          git push
